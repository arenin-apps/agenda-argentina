name: Rastreador de Eventos Argentinos

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Project Dependencies
        run: |
          npm init -y
          npm install @google/generative-ai

      - name: Run Script Extractor with Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node script-extractor.js

      - name: Commit and Push Updated Events Database
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add eventos.json
          git diff-index --quiet HEAD || (git commit -m "🤖 [Bot] Actualización automática de eventos de Argentina en UK" && git push)
