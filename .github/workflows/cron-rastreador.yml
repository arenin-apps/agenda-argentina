name: Rastreador de Eventos Argentinos

on:
  schedule:
    - cron: '0 */6 * * *' # Corre automáticamente cada 6 horas
  workflow_dispatch: # Te permite darle al botón manual cuando quieras

jobs:
  rastrear-eventos:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Configurar Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Instalar Dependencias Limpias
      run: |
        npm init -y
        npm install axios cheerio fs

    - name: Ejecutar Motor de Extracción Real
      run: node script-extractor.js

    - name: Forzar Guardado de Datos Reales en GitHub
      run: |
        git config --global user.name "arenin-apps"
        git config --global user.email "sergio@sergius.uk"
        git add eventos.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Sincronización manual forzada con datos purificados" && git push)
