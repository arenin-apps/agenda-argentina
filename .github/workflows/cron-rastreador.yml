name: Rastreador de Eventos Argentinos

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  rastrear-eventos:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Eliminar bloqueos e instalar librerías
      run: |
        rm -rf node_modules package-lock.json
        npm init -y
        npm install axios cheerio fs

    - name: Ejecutar Extractor Real
      run: node script-extractor.js

    - name: Forzar subida de datos reales
      run: |
        git config --global user.name "actions-user"
        git config --global user.email "actions@github.com"
        git add eventos.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización masiva forzada de eventos" && git push)
