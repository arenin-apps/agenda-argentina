                              value={editEvent.city}
                              onChange={(e) => setEditEvent({...editEvent, city: e.target.value})}
                              className="w-full px-3 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-slate-200"
                            />
                          </div>
                          <div>
                            <label className="block text-slate-400 mb-1">Precio:</label>
                            <input
                              type="text"
                              value={editEvent.price}
                              onChange={(e) => setEditEvent({...editEvent, price: e.target.value})}
                              className="w-full px-3 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-slate-200"
                            />
                          </div>

                          <div className="col-span-2">
                            <label className="block text-slate-400 mb-1">Enlace Oficial de Boletos:</label>
                            <input
                              type="text"
                              value={editEvent.link}
                              onChange={(e) => setEditEvent({...editEvent, link: e.target.value})}
                              className="w-full px-3 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-slate-200"
                            />
                          </div>

                          <div className="col-span-2">
                            <label className="block text-slate-400 mb-1">Breve Descripción:</label>
                            <textarea
                              rows={2}
                              value={editEvent.description}
                              onChange={(e) => setEditEvent({...editEvent, description: e.target.value})}
                              className="w-full p-2 bg-slate-950 border border-slate-800 rounded-lg text-slate-200"
                            />
                          </div>

                          <div>
                            <label className="block text-slate-400 mb-1">Categoría:</label>
                            <select
                              value={editEvent.category}
                              onChange={(e) => setEditEvent({...editEvent, category: e.target.value})}
                              className="w-full px-3 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-slate-200"
                            >
                              {categories.slice(1).map(cat => (
                                <option key={cat} value={cat}>{cat}</option>
                              ))}
                            </select>
                          </div>
                          <div>
                            <label className="block text-slate-400 mb-1">Fuente (Source Name):</label>
                            <input
                              type="text"
                              value={editEvent.source}
                              onChange={(e) => setEditEvent({...editEvent, source: e.target.value})}
                              className="w-full px-3 py-1.5 bg-slate-950 border border-slate-800 rounded-lg text-slate-200"
                            />
                          </div>
                        </div>

                        {/* Sync Publish Buttons inside Panel Form */}
                        <div className="pt-4 border-t border-slate-800 flex flex-col sm:flex-row gap-2 justify-end">
                          <button
                            onClick={handleAddLocalOnly}
                            className="px-4 py-2 bg-slate-850 hover:bg-slate-800 text-slate-200 rounded-xl text-xs font-bold transition-all"
                          >
                            Inyectar sólo Local (Temporal)
                          </button>
                          
                          <button
                            onClick={handlePublishToGitHub}
                            disabled={isSyncing}
                            className="px-5 py-2 bg-emerald-500 hover:bg-emerald-600 disabled:bg-slate-800 text-slate-950 disabled:text-slate-500 font-bold rounded-xl text-xs tracking-wider transition-all flex items-center justify-center space-x-1"
                          >
                            {isSyncing ? (
                              <>
                                <RefreshCw className="h-3 w-3 animate-spin" />
                                <span>Sincronizando GitHub...</span>
                              </>
                            ) : (
                              <>
                                <CheckCircle className="h-3.5 w-3.5" />
                                <span>Publicar en GitHub (eventos.json)</span>
                              </>
                            )}
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div className="h-full border border-dashed border-slate-800 rounded-2xl flex flex-col items-center justify-center p-8 text-center text-slate-500">
                        <Sparkles className="h-8 w-8 mb-2 text-slate-600 animate-pulse" />
                        <p className="text-xs">Los detalles del evento de la IA aparecerán aquí una vez completado el paso 1.</p>
                      </div>
                    )}
                  </div>
                </div>

              </div>
            )}

          </main>

          {/* FOOTER */}
          <footer className="bg-slate-950 border-t border-slate-900 py-12 mt-16 text-slate-500">
            <div className="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 text-center text-xs space-y-4">
              <p>© 2026 - Agenda Cultural Argentina en UK. Proyecto libre y comunitario.</p>
              
              {/* Subtle administrative access toggle lock icon */}
              <div className="flex justify-center items-center space-x-2 pt-2">
                <button
                  onClick={() => setIsLockModalOpen(true)}
                  className="text-slate-700 hover:text-slate-500 transition-colors duration-200 focus:outline-none"
                  title="Acceso de Administrador"
                >
                  <Lock className="h-4.5 w-4.5" />
                </button>
              </div>
            </div>
          </footer>

          {/* PASSCODE MODAL DIALOG - Sin pistas visuales ni texto delator */}
          {isLockModalOpen && (
            <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center bg-slate-950/90 backdrop-blur-sm p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-sm w-full p-6 shadow-2xl relative">
                <button 
                  onClick={() => setIsLockModalOpen(false)}
                  className="absolute top-4 right-4 text-slate-500 hover:text-white font-bold"
                >
                  ✕
                </button>

                <div className="text-center space-y-4">
                  <div className="mx-auto w-12 h-12 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                    <Lock className="h-6 w-6" />
                  </div>
                  
                  <div>
                    <h3 className="text-base font-bold text-white">Acceso al Panel de Control Secreto</h3>
                    <p className="text-xs text-slate-400 mt-1">Ingresa el código de acceso para desbloquear las herramientas de administración.</p>
                  </div>

                  <form onSubmit={handleUnlock} className="space-y-3">
                    <input
                      type="password"
                      value={passcode}
                      onChange={(e) => setPasscode(e.target.value)}
                      placeholder="Código de acceso"
                      className="block w-full px-4 py-2.5 bg-slate-950 border border-slate-800 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-transparent text-center text-slate-100 placeholder-slate-600 text-sm font-mono tracking-widest"
                      autoFocus
                    />
                    
                    {passcodeError && (
                      <p className="text-[11px] text-rose-500 font-semibold">{passcodeError}</p>
                    )}

                    <button
                      type="submit"
                      className="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold rounded-xl text-xs tracking-wider transition-all"
                    >
                      Desbloquear Panel
                    </button>
                  </form>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
