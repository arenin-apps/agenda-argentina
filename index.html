                    {extractedEvent && (

                      >
                        <Plus className="h-4 w-4" />
                        <span>Inyectar Evento en Cartelera Interactiva</span>
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* PESTAÑA 4: CONSOLA DE PIPELINE AUTOMÁTICO */}
            {activeTab === 'terminal' && (
              <div className="space-y-6">
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                  <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center space-x-2">
                      <Terminal className="h-6 w-6 text-indigo-400" />
                      <h2 className="text-xl font-bold text-white">Consola de Automatización (Daily GitHub Actions Run)</h2>

                    <button

                      className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center space-x-1.5 ${

                    >
                      <RefreshCw className={`h-3 w-3 ${isPlayingLogs ? 'animate-spin' : ''}`} />

                  {/* CONSOLA DIGITAL */}

                      <span className="flex items-center space-x-1">
                        <span className="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span className="text-[10px]">CONECTADO</span>

                    </div>
                    {activeLogs.map((log, idx) => (
                      <div key={idx} className="hover:bg-slate-900/50 py-0.5 rounded px-1 transition-colors">
                        {log}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Código del Script Automatizado */}
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                  <h3 className="text-sm font-bold text-white mb-2 flex items-center space-x-2">
                    <Code className="h-4 w-4 text-indigo-400" />
                    <span>Estructura de Extracción Automatizada (script-extractor.js)</span>
                  </h3>
                  <p className="text-xs text-slate-400 mb-4">
                    El script de NodeJS utiliza la SDK oficial de Google Generative AI para conectarse con Gemini 1.5 Flash, reduciendo drásticamente la tasa de fallos por rediseños visuales de los sitios.
                  </p>
                  <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 font-mono text-xs text-slate-400 overflow-x-auto">
                    <pre>{`const { GoogleGenAI } = require("@google/generative-ai");

                  </div>
                </div>
              </div>
            )}

          </main>

          {/* FOOTER */}
          <footer className="bg-slate-950 border-t border-slate-900 py-12 mt-16 text-slate-500">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs space-y-4">
              <p>© 2026 - Agenda Cultural Argentina en UK. Proyecto libre y comunitario.</p>
              <div className="flex justify-center space-x-6 text-[11px] font-mono">
                <span>Rango de Simulación Activa: 15 Jun - 15 Dic 2026</span>
                <span>•</span>
                <span>Fuentes Autorizadas: {sources.length}</span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // Renderizado de la App en el nodo root con React 18
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
