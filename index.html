<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Eventos - Sergius</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --accent-color: #00ff66;
            --accent-fail: #ff3333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .badge-live {
            background-color: rgba(0, 255, 102, 0.15);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
        }

        .badge-backup {
            background-color: rgba(255, 51, 51, 0.15);
            color: var(--accent-fail);
            border: 1px solid var(--accent-fail);
        }

        .meta-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .event-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-left: 4px solid var(--accent-color);
            transition: transform 0.2s;
        }

        .event-card:hover {
            transform: translateY(-2px);
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .event-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .event-date {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ffffff;
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .event-title {
            font-size: 1.25rem;
            margin: 5px 0;
            font-weight: 700;
        }

        .event-venue {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .event-description {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #dddddd;
            margin-bottom: 15px;
        }

        .btn-link {
            display: inline-block;
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-link:hover {
            background-color: var(--accent-color);
            color: #000000;
        }

        .no-events {
            text-align: center;
            padding: 4px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Radar de Eventos UK</h1>
            <div id="status-badge" class="badge badge-live">Sincronización Activa</div>
        </header>

        <div class="meta-info" id="meta-actualizacion">
            Cargando cartelera inteligente...
        </div>

        <main id="contenedor-eventos">
            </main>
    </div>

    <script>
        // CARTELERA DE RESPALDO (ESCUDO ANTI-CAÍDAS)
        // Se activa SOLO si el archivo eventos.json no responde a tiempo
        const CARTELERA_RESPALDO = [
            {
                category: "Artes Plásticas / Exhibición",
                title: "Julio Le Parc: Obras Cinéticas e Inmersivas",
                venue: "Tate Modern, Bankside, Londres",
                displayDate: "11 de Junio al 11 de Diciembre de 2026",
                description: "Gran retrospectiva dedicada al pionero argentino del arte óptico y cinético.",
                url: "https://www.tate.org.uk/whats-on/tate-modern/julio-le-parc"
            },
            {
                category: "Música / Concierto",
                title: "Estelares en Londres - Gira 'Las Antorchas'",
                venue: "Oslo Hackney, Londres",
                displayDate: "Sábado 05 de Septiembre de 2026 (19:00)",
                description: "La mítica banda de rock canción liderada por Manuel Moretti se presenta por primera vez en el Reino Unido.",
                url: "https://sergius.uk/event/estelares-en-londres-2026/"
            }
        ];

        function pintarEventos(eventos) {
            const contenedor = document.getElementById('contenedor-eventos');
            contenedor.innerHTML = '';

            if (!eventos || eventos.length === 0) {
                contenedor.innerHTML = '<div class="no-events">No hay eventos activos programados para los próximos 6 meses.</div>';
                return;
            }

            eventos.forEach(ev => {
                const card = document.createElement('div');
                card.className = 'event-card';

                card.innerHTML = `
                    <div class="event-header">
                        <span class="event-category">${ev.category || 'Cultura'}</span>
                        <span class="event-date">${ev.displayDate || 'Consultar Fecha'}</span>
                    </div>
                    <div class="event-title">${ev.title}</div>
                    <div class="event-venue">📍 ${ev.venue || 'Londres, UK'}</div>
                    <div class="event-description">${ev.description || ''}</div>
                    <a href="${ev.url}" target="_blank" class="btn-link">Ver Entradas Oficiales</a>
                `;
                contenedor.appendChild(card);
            });
        }

        async function cargarCartelera() {
            const badge = document.getElementById('status-badge');
            const meta = document.getElementById('meta-actualizacion');

            try {
                // TRUCO MAESTRO: Cache Busting usando el timestamp de este segundo exacto (?v=123456789)
                const urlConRompeCache = `eventos.json?v=${new Date().getTime()}`;
                
                console.log(`📡 Solicitando datos frescos saltando CDN: ${urlConRompeCache}`);
                const respuesta = await fetch(urlConRompeCache);
                
                if (!respuesta.ok) throw new Error("Archivo JSON no disponible temporalmente");
                
                const datos = await respuesta.json();
                
                // Pintar cartelera real recién procesada por GitHub Actions
                meta.innerText = `Última actualización del radar: ${datos.lastUpdated || 'Reciente'}`;
                badge.innerText = "Conexión en Vivo";
                badge.className = "badge badge-live";
                
                pintarEventos(datos.events);

            } catch (error) {
                console.log("⚠️ Activando escudo protector: Entregando cartelera local corregida.");
                
                // Si la CDN de GitHub se traba, pintamos el respaldo inmediatamente
                meta.innerText = "Visualizando cartelera de contingencia local (Modo Seguro)";
                badge.innerText = "Cartelera de Respaldo Activa";
                badge.className = "badge badge-backup";
                
                pintarEventos(CARTELERA_RESPALDO);
            }
        }

        // Lanzar de forma automática al abrir la web
        window.addEventListener('DOMContentLoaded', cargarCartelera);
    </script>
</body>
</html>
