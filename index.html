<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Cultural Argentina en UK - Automático 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased font-sans">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Calendar = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>;
    const MapPin = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>;
    const ExternalLink = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
    const Lock = (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;

    const fallbackEvents = [
      { id: "evt-tate-leparc", title: "Julio Le Parc: Light. Colour. Action.", date: "2026-06-15", endDate: "2027-05-03", dateLabel: "11 JUN 2026 - 03 MAY 2027", venue: "Tate Modern", city: "Londres", region: "Inglaterra", price: "Desde £15", link: "https://www.tate.org.uk/whats-on/tate-modern/julio-le-parc", description: "Exposición retrospectiva de Julio Le Parc.", category: "Artes Plásticas", source: "Tate Modern" },
      { id: "evt-wc-austria", title: "Mundial 2026: Argentina vs Austria", date: "2026-06-22", dateLabel: "LUNES, 22 JUNIO 2026", venue: "Metropolis (72 Albert Embankment)", city: "Londres", region: "Inglaterra", price: "Gratis", link: "https://arenin.uk/", description: "Pantalla gigante en Vauxhall.", category: "TV / Deportes", source: "Arenin UK" },
      { id: "evt-cat-manchester", title: "Ca7riel & Paco Amoroso - Baño María Tour (Manchester)", date: "2026-08-31", dateLabel: "LUNES, 31 AGOSTO 2026", venue: "O2 Apollo Manchester", city: "Manchester", region: "Inglaterra", price: "Desde £28", link: "https://www.livenation.co.uk/", description: "Gira mundial.", category: "Música", source: "Live Nation" },
      { id: "evt-cat-london", title: "Ca7riel & Paco Amoroso - Baño María Tour (Londres)", date: "2026-09-02", dateLabel: "MIÉRCOLES, 02 SEPTIEMBRE 2026", venue: "O2 Academy Brixton", city: "Londres", region: "Inglaterra", price: "Desde £28", link: "https://www.livenation.co.uk/", description: "Gira mundial.", category: "Música", source: "Live Nation" }
    ];

    function App() {
      const [events, setEvents] = useState(fallbackEvents);
      const [hidePastEvents, setHidePastEvents] = useState(true);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [passcode, setPasscode] = useState('');

      const filteredEvents = events.filter(evt => {
        const today = new Date(); today.setHours(0,0,0,0);
        const endDate = evt.endDate ? new Date(evt.endDate + "T00:00:00") : new Date(evt.date + "T00:00:00");
        if (hidePastEvents && endDate < today) return false;
        return true;
      });

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-8">
          <header className="max-w-xl mx-auto mb-8">
            <h1 className="text-3xl font-black text-white mb-2">Agenda Argentina UK</h1>
            <label className="flex items-center gap-2 text-sm text-slate-400">
              <input type="checkbox" checked={hidePastEvents} onChange={(e) => setHidePastEvents(e.target.checked)}/> 
              Ocultar eventos finalizados
            </label>
          </header>

          <div className="max-w-xl mx-auto space-y-6">
            {filteredEvents.map(evt => {
              const isVirtual = ["TV / Deportes", "Cine"].includes(evt.category);
              const mapsUrl = isVirtual ? null : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${evt.venue}, ${evt.city}, UK`)}`;
              
              return (
                <div key={evt.id} className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                  <div className="text-[10px] font-bold text-sky-400 uppercase tracking-widest mb-3">{evt.category} • {evt.source}</div>
                  <a href={evt.link} target="_blank" className="text-xl font-bold hover:text-sky-300 block mb-2">{evt.title} <ExternalLink className="inline h-4 w-4"/></a>
                  <p className="text-slate-400 text-sm mb-4">{evt.description}</p>
                  
                  <div className="space-y-3 border-t border-slate-800 pt-4">
                    <div className="flex items-center gap-3 text-sm font-mono text-sky-200">
                      <Calendar className="h-4 w-4 shrink-0" /> {evt.dateLabel}
                    </div>
                    <div className="flex items-center gap-3 text-sm text-slate-300">
                      <MapPin className="h-4 w-4 shrink-0 text-rose-500" />
                      {mapsUrl ? <a href={mapsUrl} target="_blank" className="hover:underline text-sky-400 font-semibold">{evt.venue}</a> : <span>{evt.venue}</span>}
                    </div>
                  </div>
                  <div className="text-emerald-400 text-sm font-bold mt-4 pt-4 border-t border-slate-800">💳 {evt.price}</div>
                </div>
              )
            })}
          </div>

          <button onClick={() => setIsModalOpen(true)} className="fixed bottom-4 right-4 p-2 opacity-50 hover:opacity-100"><Lock className="h-6 w-6"/></button>
          
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4">
              <div className="bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-slate-800">
                <input type="password" placeholder="Código" className="w-full p-3 bg-slate-950 mb-4 rounded-lg border border-slate-700" onChange={(e) => setPasscode(e.target.value)} />
                <button className="w-full bg-emerald-500 p-3 rounded-lg font-bold" onClick={() => { if(passcode === '1986') {alert('Panel Admin Activo'); setIsModalOpen(false);} }}>Ingresar</button>
              </div>
            </div>
          )}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
